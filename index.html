<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexTok - Complete Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; margin: 0; }
        .page { display: none; height: 100vh; width: 100%; position: absolute; top: 0; }
        .active-page { display: block; }
        .video-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .video-card { scroll-snap-align: start; height: 100vh; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Like Animation */
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-400px) scale(2); opacity: 0; }
        }
        .like-bubble { position: absolute; bottom: 100px; right: 40px; animation: floatUp 1.5s ease-out forwards; z-index: 200; pointer-events: none; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .featured-badge { background: linear-gradient(to right, #ff0050, #00f2ea); color: white; padding: 2px 10px; border-radius: 4px; font-size: 10px; font-weight: 900; margin-bottom: 5px; display: inline-block; }
    </style>
</head>
<body>

    <div id="login-page" class="page active-page flex items-center justify-center">
        <div class="glass p-12 rounded-[50px] text-center max-w-xs w-full shadow-2xl">
            <h1 class="text-6xl font-black mb-2 italic tracking-tighter">NexTok</h1>
            <p class="text-gray-400 mb-12 text-[10px] uppercase font-bold tracking-[0.3em]">Next Gen Social</p>
            <button onclick="login()" class="w-full bg-white text-black py-4 rounded-full font-black shadow-xl active:scale-95 transition">Google Login</button>
        </div>
    </div>

    <div id="home-page" class="page">
        <div id="video-feed" class="video-container"></div>
    </div>

    <div id="inbox-page" class="page bg-white text-black overflow-y-auto pb-24">
        <div class="p-6">
            <h2 class="text-4xl font-black mb-6 italic tracking-tighter">Discover</h2>
            <div class="relative mb-8">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="user-search-input" oninput="searchUsers()" placeholder="Search users..." 
                class="w-full bg-gray-100 py-4 pl-12 pr-4 rounded-2xl outline-none font-bold text-sm">
            </div>
            <div id="user-list" class="space-y-4"></div>
        </div>
    </div>

    <div id="profile-page" class="page bg-white text-black overflow-y-auto pb-24">
        <div class="p-8 text-center">
            <img id="user-img" src="" class="w-28 h-28 rounded-full border-4 border-gray-100 shadow-2xl mx-auto mb-6 object-cover">
            <h2 id="display-name-view" class="text-3xl font-black italic">User</h2>
            <p id="display-handle-view" class="text-gray-400 font-bold text-sm mt-1">@username</p>
            
            <div class="flex justify-center gap-10 my-10 border-y py-6 border-gray-50">
                <div class="text-center"><b>1.2K</b><p class="text-[10px] font-bold text-gray-400 uppercase">Following</p></div>
                <div class="text-center"><b>850K</b><p class="text-[10px] font-bold text-gray-400 uppercase">Followers</p></div>
            </div>

            <button onclick="openEditModal()" class="w-full bg-black text-white py-4 rounded-2xl font-black mb-4 shadow-lg">Edit Profile Name</button>
            <button onclick="logout()" class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-black">Logout</button>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-black/90 z-[600] hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[40px] p-8 text-black">
            <h2 class="text-2xl font-black mb-6">Update Name</h2>
            <input type="text" id="new-name-input" class="w-full bg-gray-100 p-4 rounded-2xl outline-none mb-6 font-bold">
            <div class="flex gap-3">
                <button onclick="closeEditModal()" class="flex-1 py-4 font-bold text-gray-400">Cancel</button>
                <button onclick="updateUsername()" class="flex-1 bg-black text-white py-4 rounded-2xl font-bold">Save</button>
            </div>
        </div>
    </div>

    <div id="upload-overlay" class="fixed inset-0 bg-black/95 z-[300] hidden flex flex-col items-center justify-center p-6 backdrop-blur-xl">
        <div class="w-full max-w-sm bg-white rounded-[40px] p-8 text-black">
            <h2 class="text-2xl font-black mb-6 italic">Post Reel</h2>
            <input type="file" id="video-input" class="mb-4 w-full text-xs font-bold" accept="video/*">
            <textarea id="video-caption" placeholder="Caption here..." class="w-full bg-gray-100 p-4 rounded-2xl mb-6 outline-none h-24 resize-none"></textarea>
            <div id="progress-container" class="w-full bg-gray-100 h-2 rounded-full mb-6 hidden overflow-hidden">
                <div id="upload-progress" class="bg-black h-full w-0 transition-all"></div>
            </div>
            <button id="upload-btn" onclick="uploadVideo()" class="w-full bg-black text-white py-4 rounded-2xl font-black">Upload Now</button>
            <p onclick="closeUpload()" class="text-center mt-4 text-gray-400 font-bold text-xs cursor-pointer">Close</p>
        </div>
    </div>

    <div id="chat-window" class="fixed inset-0 bg-white z-[500] hidden flex flex-col text-black">
        <div class="p-5 border-b flex items-center gap-4 bg-gray-50">
            <i class="fas fa-chevron-left text-xl" onclick="closeChat()"></i>
            <img id="chat-user-img" src="" class="w-10 h-10 rounded-full border">
            <span id="chat-user-name" class="font-black">Chat</span>
        </div>
        <div id="messages-container" class="flex-1 p-5 overflow-y-auto space-y-4 flex flex-col"></div>
        <div class="p-4 border-t flex gap-2">
            <input type="text" id="msg-input" placeholder="Say something..." class="flex-1 bg-gray-100 rounded-full px-5 py-3 outline-none">
            <button onclick="sendMessage()" class="bg-black text-white w-12 h-12 rounded-full"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black/80 backdrop-blur-md border-t border-white/10 flex justify-around items-center py-6 text-white z-[100]">
        <i class="fas fa-home text-2xl cursor-pointer" onclick="showPage('home-page')"></i>
        <i class="fas fa-search text-2xl opacity-40 cursor-pointer" onclick="showPage('inbox-page')"></i>
        <div class="bg-white text-black px-5 py-1.5 rounded-xl cursor-pointer" onclick="openUpload()"><i class="fas fa-plus font-black"></i></div>
        <i class="fas fa-user text-2xl opacity-40 cursor-pointer" onclick="showPage('profile-page')"></i>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, setDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        // Your Firebase Config (nextok-f84be)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY_HERE", // **স্ক্রিনশট থেকে এপিআই কী এখানে দিন**
            authDomain: "nextok-f84be.firebaseapp.com",
            projectId: "nextok-f84be",
            storageBucket: "nextok-f84be.firebasestorage.app",
            messagingSenderId: "1056586071060",
            appId: "1:1056586071060:web:80373801f926065529f5f0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        const targetUID = "PASTE_UID_HERE"; // বিশেষ আইডি এখানে দিন

        onAuthStateChanged(auth, (user) => {
            if (user) {
                setDoc(doc(db, "Users", user.uid), { name: user.displayName, photoURL: user.photoURL, uid: user.uid }, { merge: true });
                showPage('home-page');
                refreshProfileUI(user);
                syncFeed();
                searchUsers(); // লোড ইউজার লিস্ট
            } else { showPage('login-page'); }
        });

        window.login = () => signInWithPopup(auth, provider);
        window.logout = () => signOut(auth);

        // FEED & SORTING
        function syncFeed() {
            const q = query(collection(db, "Reels"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('video-feed');
                feed.innerHTML = '';
                let vids = [];
                snapshot.forEach(d => vids.push({ id: d.id, ...d.data() }));

                // Featured logic
                vids.sort((a, b) => (a.userId === targetUID ? -1 : b.userId === targetUID ? 1 : 0));

                vids.forEach(data => {
                    feed.innerHTML += `
                        <div class="video-card" id="card-${data.id}">
                            <video src="${data.videoUrl}" loop onclick="this.paused ? this.play() : this.pause()"></video>
                            <div class="absolute left-6 bottom-28">
                                ${data.userId === targetUID ? '<span class="featured-badge">FEATURED BY ADMIN</span>' : ''}
                                <h3 class="font-black text-xl italic tracking-tighter">@${data.userName.split(' ')[0].toLowerCase()}</h3>
                                <p class="text-sm opacity-70">${data.caption || ''}</p>
                            </div>
                            <div class="absolute right-6 bottom-40 flex flex-col items-center gap-8">
                                <div onclick="handleLike('${data.id}')" class="text-center"><i class="fas fa-heart text-4xl"></i></div>
                                <i class="fas fa-comment-dots text-4xl"></i>
                                <i class="fas fa-share text-4xl"></i>
                            </div>
                        </div>`;
                });
            });
        }

        window.handleLike = (id) => {
            const card = document.getElementById(`card-${id}`);
            const bubble = document.createElement('div');
            bubble.className = 'like-bubble';
            bubble.innerHTML = `<img src="${auth.currentUser.photoURL}" class="w-12 h-12 rounded-full border-2 border-white">`;
            card.appendChild(bubble);
            setTimeout(() => bubble.remove(), 1500);
        };

        // SEARCH USERS
        window.searchUsers = () => {
            const term = document.getElementById('user-search-input').value.toLowerCase();
            onSnapshot(collection(db, "Users"), (s) => {
                const list = document.getElementById('user-list');
                list.innerHTML = '';
                s.forEach(d => {
                    const u = d.data();
                    if(u.uid !== auth.currentUser.uid && (u.name.toLowerCase().includes(term) || u.uid.includes(term))) {
                        list.innerHTML += `
                            <div class="flex items-center gap-4 p-4 hover:bg-gray-50 rounded-3xl cursor-pointer border border-gray-50 shadow-sm" onclick="openChat('${u.uid}', '${u.name}', '${u.photoURL}')">
                                <img src="${u.photoURL}" class="w-12 h-12 rounded-full">
                                <div class="flex-1"><h4 class="font-black text-sm">${u.name}</h4><p class="text-[10px] text-gray-400">UID: ${u.uid.substring(0,8)}...</p></div>
                                <i class="fas fa-chevron-right text-gray-200"></i>
                            </div>`;
                    }
                });
            });
        };

        // EDIT NAME
        window.openEditModal = () => {
            document.getElementById('edit-modal').style.display = 'flex';
            document.getElementById('new-name-input').value = auth.currentUser.displayName;
        };
        window.closeEditModal = () => document.getElementById('edit-modal').style.display = 'none';
        window.updateUsername = async () => {
            const n = document.getElementById('new-name-input').value;
            if(!n) return;
            await updateProfile(auth.currentUser, { displayName: n });
            await setDoc(doc(db, "Users", auth.currentUser.uid), { name: n }, { merge: true });
            refreshProfileUI(auth.currentUser);
            closeEditModal();
        };

        // CHAT & UPLOAD
        let chatID = null;
        window.openChat = (uid, n, img) => {
            chatID = uid;
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-user-name').innerText = n;
            document.getElementById('chat-user-img').src = img;
            const convoID = [auth.currentUser.uid, uid].sort().join('_');
            const q = query(collection(db, "Chats", convoID, "Messages"), orderBy("timestamp", "asc"));
            onSnapshot(q, (s) => {
                const c = document.getElementById('messages-container');
                c.innerHTML = '';
                s.forEach(d => {
                    const m = d.data();
                    const me = m.senderId === auth.currentUser.uid;
                    c.innerHTML += `<div class="${me?'self-end bg-black text-white':'self-start bg-gray-100'} px-4 py-2 rounded-2xl text-sm font-bold shadow-sm max-w-[80%]">${m.text}</div>`;
                });
                c.scrollTop = c.scrollHeight;
            });
        };
        window.closeChat = () => document.getElementById('chat-window').style.display = 'none';
        window.sendMessage = async () => {
            const i = document.getElementById('msg-input');
            if(!i.value || !chatID) return;
            const convoID = [auth.currentUser.uid, chatID].sort().join('_');
            await addDoc(collection(db, "Chats", convoID, "Messages"), { text: i.value, senderId: auth.currentUser.uid, timestamp: serverTimestamp() });
            i.value = '';
        };

        window.openUpload = () => document.getElementById('upload-overlay').style.display = 'flex';
        window.closeUpload = () => {
            document.getElementById('upload-overlay').style.display = 'none';
            document.getElementById('progress-container').classList.add('hidden');
        };
        window.uploadVideo = async () => {
            const f = document.getElementById('video-input').files[0];
            if(!f) return alert("Select video!");
            const refS = ref(storage, `reels/${Date.now()}`);
            const t = uploadBytesResumable(refS, f);
            document.getElementById('progress-container').classList.remove('hidden');
            t.on('state_changed', (s) => {
                document.getElementById('upload-progress').style.width = (s.bytesTransferred/s.totalBytes)*100 + '%';
            }, null, async () => {
                const url = await getDownloadURL(t.snapshot.ref);
                await addDoc(collection(db, "Reels"), { videoUrl: url, caption: document.getElementById('video-caption').value, userId: auth.currentUser.uid, userName: auth.currentUser.displayName, createdAt: serverTimestamp() });
                closeUpload();
            });
        };

        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
            document.querySelectorAll('nav i').forEach(i => i.style.opacity = '0.4');
            event.target.style.opacity = '1';
        };

        function refreshProfileUI(u) {
            document.getElementById('display-name-view').innerText = u.displayName;
            document.getElementById('user-img').src = u.photoURL;
            document.getElementById('display-handle-view').innerText = "@" + u.displayName.split(' ')[0].toLowerCase();
        }
    </script>
</body>
</html>
